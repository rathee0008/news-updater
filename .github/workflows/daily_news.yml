name: Daily UPSC News Digest

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news and build digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python fetch_news.py

      - name: Commit and push digest
        run: |
          git config user.name "news-updater-bot"
          git config user.email "actions@github.com"
          git add digests/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily UPSC news digest - $(date +'%Y-%m-%d')"
          git push
